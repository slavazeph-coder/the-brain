# Railway config for BrainSNN TRIBE v2 server.
# Deploy:  railway login && railway init && railway up
#
# WARNING: Railway's free tier (512MB RAM) cannot run TRIBE v2 inference
# without OOM-killing. Use the Pro plan or a paid Hobby seat with at least
# 2GB allocated to this service. For inference workloads, prefer Fly.io
# (see fly.toml in this directory).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn api:app --host 0.0.0.0 --port $PORT --workers 1"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30
