<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#13203f"/>
      <stop offset="100%" stop-color="#0b1224"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ad4ff"/>
      <stop offset="100%" stop-color="#7b8cff"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Neural edges forming a stylized brain silhouette -->
  <g stroke="url(#glow)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M150 318 C118 296 110 240 134 204 C150 174 186 152 226 154"/>
    <path d="M226 154 C252 128 312 126 344 156"/>
    <path d="M344 156 C386 168 408 214 396 254"/>
    <path d="M396 254 C404 296 374 332 334 340"/>
    <path d="M334 340 C312 368 260 374 230 352"/>
    <path d="M230 352 C196 360 162 344 150 318"/>
    <!-- internal connections -->
    <path d="M226 154 L256 232" opacity="0.7"/>
    <path d="M344 156 L256 232" opacity="0.7"/>
    <path d="M150 318 L256 232" opacity="0.7"/>
    <path d="M334 340 L256 232" opacity="0.7"/>
    <path d="M396 254 L256 232" opacity="0.55"/>
    <path d="M230 352 L256 232" opacity="0.55"/>
  </g>

  <!-- Synapse nodes -->
  <g fill="#5ad4ff">
    <circle cx="226" cy="154" r="18"/>
    <circle cx="344" cy="156" r="18"/>
    <circle cx="396" cy="254" r="16"/>
    <circle cx="334" cy="340" r="16"/>
    <circle cx="230" cy="352" r="16"/>
    <circle cx="150" cy="318" r="16"/>
    <circle cx="134" cy="204" r="13" opacity="0.9"/>
  </g>

  <!-- Hub neuron -->
  <circle cx="256" cy="232" r="30" fill="url(#glow)"/>
  <circle cx="256" cy="232" r="44" fill="none" stroke="#5ad4ff" stroke-width="5" opacity="0.35"/>
</svg>
