# Pinned dependency snapshot for reproducible runs of the Qiskit suite.
# Generated 2026-04-30 against Python 3.11 on Linux x86_64.
#
# Two ways to use this file:
#
#   1. Reproducible install (recommended for CI / hardware runs):
#        pip install -r requirements.lock
#
#   2. Floating install (development; quicker upgrades):
#        pip install -r requirements.txt
#
# qiskit-ibm-runtime is intentionally NOT pinned here — it is only needed for
# `--mode real`, has its own large dependency tree (cloud SDKs, gRPC, …),
# and we want users to be able to pull the latest cloud client without
# bumping the simulator stack. Add it explicitly:
#     pip install qiskit-ibm-runtime>=0.20

