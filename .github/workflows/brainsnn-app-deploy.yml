name: Deploy BrainSNN app to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'brainsnn-r3f-app/**'
      - 'Dockerfile'
      - 'railway.toml'
      - '.github/workflows/brainsnn-app-deploy.yml'
  workflow_dispatch:
    inputs:
      project_id:
        description: Railway project id
        required: false
        default: c7f26b12-f812-4785-bbaf-a49b9caeb228
      service:
        description: Railway service name
        required: false
        default: the-brain
      environment:
        description: Railway environment name
        required: false
        default: production
      health_url:
        description: URL that must return HTTP 200 after deploy
        required: false
        default: https://www.brainsnn.com/healthz

permissions:
  contents: read

concurrency:
  group: brainsnn-app-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ inputs.project_id || secrets.RAILWAY_PROJECT_ID || vars.RAILWAY_PROJECT_ID || 'c7f26b12-f812-4785-bbaf-a49b9caeb228' }}
      RAILWAY_PROJECT_NAME: wonderful-charisma
      RAILWAY_SERVICE: ${{ inputs.service || vars.RAILWAY_SERVICE || 'the-brain' }}
      RAILWAY_ENVIRONMENT: ${{ inputs.environment || vars.RAILWAY_ENVIRONMENT || 'production' }}
      RAILWAY_DEPLOY_PATH: brainsnn-r3f-app
      BRAINSNN_HEALTH_URL: ${{ inputs.health_url || vars.BRAINSNN_HEALTH_URL || 'https://www.brainsnn.com/healthz' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5

      - name: Validate app build
        shell: bash
        working-directory: brainsnn-r3f-app
        run: |
          set -euo pipefail

          npm ci
          npm run build
          npm run verify:friendly-build
          npm run test

      - name: Check Railway configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::error title=Missing Railway token::Set RAILWAY_TOKEN as a repository secret."
            exit 1
          fi

          if [ -z "${RAILWAY_PROJECT_ID:-}" ]; then
            echo "::error title=Missing Railway project::Set RAILWAY_PROJECT_ID as a repository secret or variable."
            exit 1
          fi

          echo "Project: ${RAILWAY_PROJECT_NAME} (${RAILWAY_PROJECT_ID})"
          echo "Service: ${RAILWAY_SERVICE}"
          echo "Environment: ${RAILWAY_ENVIRONMENT}"
          echo "Deploy path: ${RAILWAY_DEPLOY_PATH}"
          echo "Health URL: ${BRAINSNN_HEALTH_URL}"

      - name: Validate deploy path
        shell: bash
        run: |
          set -euo pipefail

          for file in package.json package-lock.json Dockerfile railway.toml server.js; do
            if [ ! -f "${RAILWAY_DEPLOY_PATH}/${file}" ]; then
              echo "::error title=Missing deploy file::Expected ${RAILWAY_DEPLOY_PATH}/${file}."
              exit 1
            fi
          done

      - name: Link Railway project
        shell: bash
        run: |
          set -euo pipefail

          railway link \
            --project "${RAILWAY_PROJECT_ID}" \
            --service "${RAILWAY_SERVICE}" \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --json

      - name: Deploy BrainSNN app
        shell: bash
        run: |
          set -euo pipefail

          echo "DEPLOY_STARTED_AT=$(date -u +%s)" >> "${GITHUB_ENV}"

          railway up \
            "${RAILWAY_DEPLOY_PATH}" \
            --path-as-root \
            --service "${RAILWAY_SERVICE}" \
            --environment "${RAILWAY_ENVIRONMENT}" \
            --detach \
            --message "GitHub Actions deploy ${GITHUB_SHA}"

      - name: Wait for Railway deployment
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..90}; do
            railway deployment list \
              --service "${RAILWAY_SERVICE}" \
              --environment "${RAILWAY_ENVIRONMENT}" \
              --limit 5 \
              --json > /tmp/brainsnn-deployments.json

            deployment="$(
              node <<'NODE'
          const fs = require('fs');
          const deployments = JSON.parse(fs.readFileSync('/tmp/brainsnn-deployments.json', 'utf8'));
          const started = Number(process.env.DEPLOY_STARTED_AT || '0') * 1000;
          const deployment = deployments.find((item) => Date.parse(item.createdAt) >= started - 60000);
          if (!deployment) {
            console.log('NONE NONE NONE');
          } else {
            console.log(`${deployment.id} ${deployment.status} ${deployment.createdAt}`);
          }
          NODE
            )"

            read -r deployment_id deployment_status deployment_created_at <<< "${deployment}"
            echo "Deployment ${deployment_id} status ${deployment_status} created ${deployment_created_at} (${attempt}/90)"

            case "${deployment_status}" in
              SUCCESS)
                exit 0
                ;;
              FAILED|CRASHED|REMOVED)
                echo "::error title=Railway deploy failed::Deployment ${deployment_id} ended with ${deployment_status}."
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "::error title=Railway deploy timed out::No successful deployment appeared within 15 minutes."
          cat /tmp/brainsnn-deployments.json
          exit 1

      - name: Verify live healthcheck
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            status="$(curl -L -sS -o /tmp/brainsnn-health.json -w '%{http_code}' "${BRAINSNN_HEALTH_URL}" || true)"
            if [ "${status}" = "200" ]; then
              cat /tmp/brainsnn-health.json
              exit 0
            fi

            echo "Healthcheck attempt ${attempt}/30 returned ${status}; waiting..."
            sleep 10
          done

          echo "::error title=BrainSNN healthcheck failed::${BRAINSNN_HEALTH_URL} did not return HTTP 200."
          cat /tmp/brainsnn-health.json 2>/dev/null || true
          exit 1

      - name: Summarize deployment
        if: success()
        shell: bash
        run: |
          {
            echo "## BrainSNN deployment"
            echo ""
            echo "- Project: ${RAILWAY_PROJECT_NAME} (${RAILWAY_PROJECT_ID})"
            echo "- Service: ${RAILWAY_SERVICE}"
            echo "- Environment: ${RAILWAY_ENVIRONMENT}"
            echo "- Deploy path: ${RAILWAY_DEPLOY_PATH}"
            echo "- Healthcheck: ${BRAINSNN_HEALTH_URL}"
            echo ""
            echo "The app should now be live at https://www.brainsnn.com/."
          } >> "${GITHUB_STEP_SUMMARY}"
