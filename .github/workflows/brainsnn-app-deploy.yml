name: Deploy BrainSNN app to Railway

# Deploys brainsnn-r3f-app (a TypeScript/Vite SPA served by an esbuild-bundled
# Express server) to the Railway service that backs brainsnn.com. Requires the
# RAILWAY_TOKEN repository secret; project/service/health defaults can be
# overridden with repository variables.

on:
  push:
    branches:
      - main
    paths:
      - "brainsnn-r3f-app/**"
      - "Dockerfile"
      - "railway.toml"
      - ".github/workflows/brainsnn-app-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brainsnn-app-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: brainsnn-r3f-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: brainsnn-r3f-app/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Boot-check the built server
        env:
          NODE_ENV: production
          PORT: "8080"
        run: |
          node dist/server.cjs &
          SRV=$!
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8080/healthz >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8080/healthz | grep -q '"status":"ok"'
          curl -sf http://127.0.0.1:8080/ | grep -Fq "Affective Intelligence Core"
          kill $SRV 2>/dev/null || true

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    environment:
      name: production
      url: https://brainsnn.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID || 'c7f26b12-f812-4785-bbaf-a49b9caeb228' }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE || 'the-brain' }}
          RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN secret is required for the deploy." >&2
            exit 1
          fi
          test -f Dockerfile
          test -f railway.toml
          test -f brainsnn-r3f-app/package.json
          # Upload the repo; Railway builds the service-rooted Dockerfile.
          railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --service "$RAILWAY_SERVICE" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --ci

      - name: Healthcheck
        env:
          HEALTH_URL: ${{ vars.BRAINSNN_HEALTH_URL || 'https://www.brainsnn.com/healthz' }}
          # The SPA shell carries the app title — proves the new build rolled out,
          # not just that something is up. Railway's rebuild takes a few minutes,
          # hence the ~10-minute retry window.
          HOME_URL: ${{ vars.BRAINSNN_SITE_HOME_URL || 'https://www.brainsnn.com/' }}
        run: |
          for i in $(seq 1 30); do
            health="$(curl -L -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || true)"
            home="$(curl -L -s -o /tmp/brainsnn-home.html -w '%{http_code}' "$HOME_URL" || true)"
            if [ "$home" = "200" ] && grep -Fq "Affective Intelligence Core" /tmp/brainsnn-home.html; then
              home_marker="ok"
            else
              home_marker="missing"
            fi
            echo "attempt $i → healthz $health, home $home/$home_marker"
            if [ "$health" = "200" ] && [ "$home_marker" = "ok" ]; then
              echo "Live service is healthy and serving the current build."
              exit 0
            fi
            sleep 20
          done
          echo "Service never became healthy on the current build ($HEALTH_URL / $HOME_URL)" >&2
          exit 1
