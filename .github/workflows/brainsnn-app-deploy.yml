name: Deploy BrainSNN app to Railway

# Deploys brainsnn-r3f-app (served by server.js) to the Railway service that
# backs brainsnn.com. Documented in brainsnn-r3f-app/DEPLOY.md — requires the
# RAILWAY_TOKEN repository secret; project/service/health defaults can be
# overridden with repository variables.

on:
  push:
    branches:
      - main
    paths:
      - 'brainsnn-r3f-app/**'
      - 'Dockerfile'
      - 'railway.toml'
      - '.github/workflows/brainsnn-app-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brainsnn-app-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brainsnn-r3f-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: brainsnn-r3f-app/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify friendly build
        run: npm run verify:friendly-build

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://brainsnn.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID || 'c7f26b12-f812-4785-bbaf-a49b9caeb228' }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE || 'the-brain' }}
          RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN secret not set — skipping CLI deploy." \
                 "Railway's GitHub integration deploys pushes to main on its own;" \
                 "the healthcheck below still verifies the live service."
            exit 0
          fi
          # Upload the whole repo: the service builds with the root
          # Dockerfile, which copies brainsnn-r3f-app/ into the image.
          # (An app-dir --path-as-root upload makes that COPY fail.)
          railway up . \
            --service "$RAILWAY_SERVICE" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --ci

      - name: Healthcheck
        env:
          HEALTH_URL: ${{ vars.BRAINSNN_HEALTH_URL || 'https://www.brainsnn.com/healthz' }}
          # An asset that only exists in current builds — proves the new
          # version finished rolling out, not just that something is up.
          # Railway's own rebuild of main takes a few minutes, hence the
          # ~10-minute retry window.
          VERSION_URL: ${{ vars.BRAINSNN_VERSION_URL || 'https://www.brainsnn.com/favicon.svg' }}
        run: |
          for i in $(seq 1 30); do
            health="$(curl -L -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || true)"
            version="$(curl -L -s -o /dev/null -w '%{http_code}' "$VERSION_URL" || true)"
            echo "attempt $i → healthz $health, version marker $version"
            if [ "$health" = "200" ] && [ "$version" = "200" ]; then
              echo "Live service is healthy and serving the current build."
              exit 0
            fi
            sleep 20
          done
          echo "Service never became healthy on the current build ($HEALTH_URL / $VERSION_URL)" >&2
          exit 1
