# Railway config for BrainSNN when the service deploys from the repository root.
# The Dockerfile builds brainsnnworkspace/ (TypeScript/Vite SPA) and serves it
# with the bundled Express server at dist/server.cjs.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/server.cjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/healthz"
healthcheckTimeout = 30
