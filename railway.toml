# Railway config for BrainSNN when the service deploys from the repository root.
# Mirrors brainsnn-r3f-app/railway.toml. The root Dockerfile builds the
# TypeScript/Vite SPA and serves it with the bundled Express server.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/server.cjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/healthz"
healthcheckTimeout = 30
