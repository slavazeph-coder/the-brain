# Railway config for BrainSNN when the service deploys from the repository root.
# The Dockerfile copies and builds brainsnn-r3f-app/, then serves it with Express.
#
# Redeploy trigger: 2026-06-18 — force a fresh Railway build/rollout of the
# current main after the live site was reported unreachable. No code change.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/healthz"
healthcheckTimeout = 30
