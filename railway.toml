# Railway config for BrainSNN when the service deploys from the repository root.
# The Dockerfile copies and builds brainsnn-r3f-app/, then serves it with Express.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/healthz"
healthcheckTimeout = 30
